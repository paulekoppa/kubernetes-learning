# ============================================================
# BACKEND DEPLOYMENT (updated)
# Now reads configuration from environment variables
# Environment variables sourced from backend-config ConfigMap
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: project-2
  labels:
    app: backend
    project: multitier
    tier: backend

spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend
        tier: backend

    spec:
      containers:
      - name: api
        image: node:18-alpine
        command:
          - sh
          - -c
          - |
            cat > server.js << 'JSEOF'
            const http = require('http');
            const port = 5000;

            // Read configuration from environment variables
            // process.env reads variables injected by Kubernetes
            // The || provides a fallback if the variable is not set
            const appMessage = process.env.APP_MESSAGE || 'Hello from Backend!';
            const appEnv     = process.env.APP_ENV     || 'unknown';
            const appVersion = process.env.APP_VERSION || '1.0.0';

            const server = http.createServer((req, res) => {
              res.statusCode = 200;
              res.setHeader('Content-Type', 'application/json');
              res.setHeader('Access-Control-Allow-Origin', '*');
              res.end(JSON.stringify({
                message:   appMessage,           // From ConfigMap via env var
                environment: appEnv,             // From ConfigMap via env var
                version:   appVersion,           // From ConfigMap via env var
                pod:       process.env.HOSTNAME, // Auto-set by Kubernetes
                timestamp: new Date().toISOString()
              }));
            });

            server.listen(port, '0.0.0.0', () => {
              console.log('Backend API v' + appVersion + ' running on port ' + port);
              console.log('Environment: ' + appEnv);
              console.log('Message configured as: ' + appMessage);
            });
            JSEOF
            node server.js

        ports:
        - containerPort: 5000
          name: http

        # ── ENVIRONMENT VARIABLES ──────────────────────────
        # Injected into the container at runtime
        # Pod can read these via process.env in Node.js
        env:

        # Method 1: Direct value (hardcoded in YAML)
        # Good for values that don't change between environments
        - name: NODE_ENV
          value: "production"

        # Method 2: From ConfigMap (recommended for configurable values)
        # Pulls each key from backend-config ConfigMap individually
        - name: APP_MESSAGE
          valueFrom:
            configMapKeyRef:
              name: backend-config    # Name of the ConfigMap
              key: APP_MESSAGE        # Key inside the ConfigMap

        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: backend-config    # Same ConfigMap
              key: APP_ENV            # Different key

        - name: APP_VERSION
          valueFrom:
            configMapKeyRef:
              name: backend-config    # Same ConfigMap
              key: APP_VERSION        # Different key

        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
